name: Vitesse stochastic staging payments

on:
  schedule:
    - cron: "34 12 21 5 *" # demo-robot-next-claim
    - cron: "2-59/5 * * * *" # demo-robot-safety-net
  push:
    paths:
      - payment-trigger.txt
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate payload without calling the Vitesse API"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: vitesse-stochastic-payment
  cancel-in-progress: false

jobs:
  create-payment:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      VITESSE_API_TOKEN: ${{ secrets.VITESSE_API_TOKEN }}
      GH_WORKFLOW_TOKEN: ${{ secrets.GH_WORKFLOW_TOKEN }}
      VITESSE_API_BASE_URL: https://staging-api.vitessepsp.com
      SEND_ACCOUNT_ID: "1077"
      SEND_CURRENCY: INR
      RECIPIENT_COUNTRY: IN
      RECIPIENT_CURRENCY: INR
      AMOUNT_AVG: "1000"
      AMOUNT_STD_DEV: "200"
      AMOUNT_CAP_MULTIPLIER: "5"
      CLAIM_MEAN_MINUTES: "5"
      UPDATE_WORKFLOW_CRON: ${{ secrets.GH_WORKFLOW_TOKEN != '' && 'true' || 'false' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || vars.DRY_RUN || 'false' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_WORKFLOW_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Refresh branch state
        run: git pull --rebase origin "$GITHUB_REF_NAME"

      - name: Check claim due
        id: due
        run: node claimScheduler.js gate

      - name: Check configuration
        if: ${{ steps.due.outputs.should_run == 'true' }}
        run: |
          echo "DRY_RUN=$DRY_RUN"
          if [ "$DRY_RUN" != "true" ] && [ -z "$VITESSE_API_TOKEN" ]; then
            echo "Missing GitHub secret: VITESSE_API_TOKEN"
            exit 1
          fi

      - name: Create staging payment
        if: ${{ steps.due.outputs.should_run == 'true' }}
        run: node index.js

      - name: Schedule next claim
        if: ${{ success() && steps.due.outputs.should_run == 'true' && env.DRY_RUN != 'true' }}
        run: node claimScheduler.js schedule

      - name: Commit updated payment state
        if: ${{ success() && steps.due.outputs.should_run == 'true' && env.DRY_RUN != 'true' }}
        run: |
          if git diff --quiet -- payment-counter.json claim-schedule.json .github/workflows/vitesse-daily-payment.yml; then
            echo "Payment state unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$GH_WORKFLOW_TOKEN" ]; then
            git remote set-url origin "https://x-access-token:${GH_WORKFLOW_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          fi
          git add payment-counter.json claim-schedule.json .github/workflows/vitesse-daily-payment.yml
          git commit -m "Advance payment counter and schedule next claim"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push failed on attempt $attempt; rebasing on latest main before retrying"
            git pull --rebase origin "$GITHUB_REF_NAME"
          done
          exit 1

name: Vitesse daily staging payment

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Generate payload without calling the Vitesse API"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  create-payment:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      VITESSE_API_TOKEN: ${{ secrets.VITESSE_API_TOKEN }}
      VITESSE_API_BASE_URL: https://staging-api.vitessepsp.com
      SEND_ACCOUNT_ID: "1077"
      SEND_CURRENCY: INR
      RECIPIENT_COUNTRY: IN
      RECIPIENT_CURRENCY: INR
      AMOUNT_AVG: "1000"
      AMOUNT_STD_DEV: "200"
      AMOUNT_CAP_MULTIPLIER: "5"
      DRY_RUN: ${{ github.event.inputs.dry_run || vars.DRY_RUN || 'false' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check configuration
        run: |
          echo "DRY_RUN=$DRY_RUN"
          if [ "$DRY_RUN" != "true" ] && [ -z "$VITESSE_API_TOKEN" ]; then
            echo "Missing GitHub secret: VITESSE_API_TOKEN"
            exit 1
          fi

      - name: Create staging payment
        run: node index.js

      - name: Commit updated payment counter
        if: ${{ success() && env.DRY_RUN != 'true' }}
        run: |
          if git diff --quiet -- payment-counter.json; then
            echo "Payment counter unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add payment-counter.json
          git commit -m "Advance payment counter"
          git push

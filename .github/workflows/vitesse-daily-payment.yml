name: Vitesse daily staging payment

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  create-payment:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      VITESSE_API_TOKEN: ${{ secrets.VITESSE_API_TOKEN }}
      VITESSE_API_BASE_URL: https://staging-api.vitessepsp.com
      SEND_ACCOUNT_ID: "1077"
      SEND_CURRENCY: INR
      RECIPIENT_COUNTRY: IN
      RECIPIENT_CURRENCY: INR
      AMOUNT_AVG: "1000"
      AMOUNT_STD_DEV: "200"
      AMOUNT_CAP_MULTIPLIER: "5"
      DRY_RUN: ${{ vars.DRY_RUN || 'false' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check configuration
        run: |
          if [ -z "$VITESSE_API_TOKEN" ]; then
            echo "Missing GitHub secret: VITESSE_API_TOKEN"
            exit 1
          fi

      - name: Create staging payment
        run: node index.js
